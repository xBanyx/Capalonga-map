<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Capalonga Guide Map</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      min-height: 100vh;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    @media (max-width: 800px) {
      body { padding-bottom: 15vh; }
    }

    /* MARQUEE */
    #marquee {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      margin-bottom: 10px;
    }
    #marquee span {
      display: inline-block;
      padding-left: 100%;
      animation: scrollText 12s linear infinite;
      font-size: 20px;
      opacity: 0.8;
    }
    @keyframes scrollText {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* HIDDEN LINKS */
    .hide {
      visibility: hidden;
      pointer-events: none;
      position: absolute;
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loader.hidden { display: none !important; }
    .loader-icon img {
      width: 100px;
      margin-bottom: 30px;
      animation: bounce 1.5s infinite;
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40%  { transform: translateY(-10px); }
      60%  { transform: translateY(-5px); }
    }
    .progress-container {
      width: 280px;
      max-width: 90vw;
      height: 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 25px;
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #10b981);
      border-radius: 12px;
      transition: width 0.3s ease;
    }
    #progressText {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }

    /* MAIN CONTENT */
    .container {
      margin-top: 20px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .container.show { opacity: 1; }

    .header h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 10px;
    }

    /* MAP VIEWER */
    .viewer {
      position: relative;
      width: 100%;
      height: 65vh;
      min-height: 420px;
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      backdrop-filter: blur(15px);
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      touch-action: none;
    }
    .viewer img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      max-width: none;
      user-select: none;
      -webkit-user-drag: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      width: auto;
      height: auto;
    }
    .viewer img.loaded { opacity: 1; }

    /* TOOLBAR */
    .toolbar {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      background: rgba(0,0,0,0.92);
      padding: 12px 16px;
      border-radius: 24px;
      backdrop-filter: blur(30px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      z-index: 10;
      max-width: calc(100vw - 32px);
      width: fit-content;
      min-width: 350px;
    }
    @media (max-width: 360px) {
      .toolbar { bottom: 5px; padding: 5px 6px; gap: 6px; border-radius: 20px; min-width: 300px; }
    }
    @media (max-width: 320px) {
      .toolbar { bottom: 10px; padding: 8px 10px; gap: 5px; border-radius: 18px; min-width: 240px; }
    }
    .toolbar button {
      flex: 0 0 auto;
      width: clamp(44px, 5vw, 52px);
      height: clamp(44px, 5vw, 52px);
      min-width: 44px; min-height: 44px;
      max-width: 56px; max-height: 56px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: clamp(18px, 2.5vw, 22px);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    @media (max-width: 360px) {
      .toolbar button {
        width: clamp(30px, 6.5vw, 44px);
        height: clamp(30px, 5.5vw, 44px);
        min-width: 30px; min-height: 30px;
        border-radius: 12px;
        font-size: clamp(15px, 2.2vw, 18px);
      }
    }
    .toolbar button:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }

    /* HOTLINES */
    .info-section h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 30px;
    }
    .hotline {
      background: rgba(255,255,255,0.08);
      padding: 30px 24px;
      border-radius: 24px;
      margin: 20px 0;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      transition: transform 0.2s ease;
    }
    .hotline:active { transform: scale(0.99); }
    .hotline b { color: #10b981; font-size: 24px; display: block; margin-bottom: 16px; font-weight: 800; }
    .hotline a {
      display: block;
      color: #f59e0b;
      text-decoration: none;
      font-size: 24px;
      font-weight: 700;
      padding: 18px 24px;
      margin: 10px 0;
      border-radius: 18px;
      background: rgba(245,158,11,0.15);
      border: 2px solid rgba(245,158,11,0.3);
      transition: all 0.2s ease;
      text-align: center;
    }
    .hotline a::before { content: '📞 '; }
    .hotline a:active { background: rgba(245,158,11,0.3); transform: scale(0.98); }

    /* NAVIGATION */
    .nav-container {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      box-shadow: 0 -8px 32px rgba(0,0,0,0.12);
      z-index: 1000;
      padding: 16px 12px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .nav-tabs {
      display: flex;
      justify-content: space-around;
      max-width: 420px;
      margin: 0 auto;
      list-style: none;
      padding: 0 8px;
      gap: 8px;
    }
    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 12px 8px;
      min-height: 60px;
      color: #757577;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 20px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .nav-tab a {
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
    }
    .nav-tab:hover { color: #007AFF; background: rgba(0,122,255,0.12); transform: translateY(-3px); }
    .nav-tab:active { transform: translateY(-1px) scale(0.98); }
    .nav-icon { font-size: 26px; margin-bottom: 4px; line-height: 1; transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); flex-shrink: 0; }
    .nav-tab:hover .nav-icon,
    .nav-tab.active .nav-icon { transform: scale(1.2); }
    .nav-label { font-size: 11px; font-weight: 600; letter-spacing: 0.02em; text-align: center; line-height: 1.2; opacity: 0.9; }
    .nav-tab.active .nav-label,
    .nav-tab:hover .nav-label { opacity: 1; }

    @media (max-width: 480px) {
      .nav-tabs { max-width: 380px; gap: 6px; }
      .nav-tab { padding: 10px 6px; min-height: 56px; }
      .nav-icon { font-size: 24px; }
      .nav-label { font-size: 10px; }
    }
    @media (hover: none) and (pointer: coarse) {
      .nav-tab:active { background: rgba(0,122,255,0.25); }
    }
    @media (min-width: 768px) {
      .nav-container {
        position: relative;
        bottom: auto;
        max-width: 420px;
        margin: 40px auto 0;
        border-radius: 28px;
        padding: 20px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      }
      .nav-tabs { gap: 12px; }
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .modal.active { display: block; opacity: 1; }
    .modal-content {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      width: 95vw;
      height: 85vh;
      max-height: 650px;
      background: #fff;
      border-radius: 24px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
    }
    .modal.active .modal-content { transform: translate(-50%, -50%) scale(1); }
    @media (max-height: 700px) {
      .modal-content { width: 98vw; height: 92vh; }
    }
    .modal-close {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 2001;
      background: rgba(0,0,0,0.7);
      border: none;
      font-size: 28px;
      color: white;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.2s ease;
      width: 48px; height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: rgba(0,0,0,0.9); transform: scale(1.1); }
    .modal-close:active { transform: scale(0.95); }
    .modal-header { padding: 24px 24px 0; }
    .modal-title { font-size: 24px; font-weight: 700; color: #1C1C1E; margin-bottom: 8px; }
    .modal-description { color: #6E6E73; font-size: 16px; margin-bottom: 24px; }
    .schedule-image { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>

  <!-- MARQUEE -->
  <div id="marquee">
    <span>⚠️ Please be mindful of your surroundings when using the map.</span>
  </div>

  <!-- Hidden preload links -->
  <div class="hide">
    <a href="sabang.html"></a>
    <a href="sibol.html"></a>
    <a href="palanas.html"></a>
  </div>

  <!-- Navigation -->
  <nav class="nav-container">
    <ul class="nav-tabs">
      <li class="nav-tab active" id="map-tab">
        <a href="#viewer" class="nav-link">
          <span class="nav-icon"><img src="map.gif" alt="" width="45"></span>
          <span class="nav-label">Map</span>
        </a>
      </li>
      <li class="nav-tab" id="schedule-tab">
        <a href="#" class="nav-link">
          <span class="nav-icon"><img src="calendar.gif" alt="" width="45"></span>
          <span class="nav-label">Schedule</span>
        </a>
      </li>
      <li class="nav-tab" id="hotlines-tab">
        <a href="#hotcalls" class="nav-link">
          <span class="nav-icon"><img src="hotline.gif" alt="" width="45"></span>
          <span class="nav-label">Hotlines</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Schedule Modal -->
  <div id="schedule-modal" class="modal">
    <div class="modal-content">
      <button class="modal-close" id="close-modal">&times;</button>
      <div class="modal-header">
        <h2 class="modal-title">📅 Mass Schedule</h2>
        <p class="modal-description">Ito ang mga Schedule ng Misa sa Fiesta</p>
      </div>
      <img src="schedule.jpg" alt="Mass Schedule" class="schedule-image">
    </div>
  </div>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-icon"><img src="logo_glow.png" alt="Capalonga Logo"></div>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="progressText">Loading...</div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container" id="mainContent">
    <div class="header">
      <h1>Capalonga Guide Map</h1>
    </div>

    <div class="viewer" id="viewer">
      <img id="mapImage" alt="Capalonga Guide Map">
      <div class="toolbar">
        <button onclick="zoomIn()"     title="Zoom In">+</button>
        <button onclick="zoomOut()"    title="Zoom Out">−</button>
        <button onclick="rotateLeft()" title="Rotate Left">⟲</button>
        <button onclick="rotateRight()"title="Rotate Right">⟳</button>
        <button onclick="resetMap()"   title="Reset">🗘</button>
        <button onclick="toggleFull()" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div class="info-section">
      <h1>🚨 Emergency Hotlines</h1>
      <section id="hotcalls">
        <div class="hotline">
          <b>⭐ PNP</b>
          <a href="tel:+639985985953">0998-598-5953</a>
        </div>
        <div class="hotline">
          <b>⚠️ MDRRMO</b>
          <a href="tel:+639165312484">0916-531-2484</a>
        </div>
        <div class="hotline">
          <b>🔥 BFP</b>
          <a href="tel:+639813946935">0981-394-6935</a>
          <a href="tel:+639209636935">0920-963-6935</a>
        </div>
      </section>
    </div>
  </div>

  <script>
    // ── MAP STATE ──
    let scale = 0.04, rotation = 0, posX = 0, posY = 0;
    let isDragging = false, startX = 0, startY = 0, startDistance = 0;

    function updateMap() {
      document.getElementById('mapImage').style.transform =
        `translate(-50%, -50%) translate(${posX}px, ${posY}px) scale(${scale}) rotate(${rotation}deg)`;
    }
    function zoomIn()      { scale = Math.min(5, scale * 1.25); updateMap(); }
    function zoomOut()     { scale = Math.max(0.02, scale * 0.8); updateMap(); }
    function rotateLeft()  { rotation = (rotation - 90 + 360) % 360; updateMap(); }
    function rotateRight() { rotation = (rotation + 90) % 360; updateMap(); }
    function resetMap()    { scale = 0.04; rotation = 0; posX = 0; posY = 0; updateMap(); }
    function toggleFull() {
      const v = document.getElementById('viewer');
      if (!document.fullscreenElement) {
        (v.requestFullscreen || v.webkitRequestFullscreen).call(v);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      }
    }

    // ── TOUCH CONTROLS ──
    const viewer = document.getElementById('viewer');
    viewer.addEventListener('touchstart', (e) => {
      if (e.target.closest('.toolbar')) return;
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - posX;
        startY = e.touches[0].clientY - posY;
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        startDistance = Math.hypot(dx, dy);
      }
    }, { passive: true });

    viewer.addEventListener('touchmove', (e) => {
      if (e.target.closest('.toolbar')) return;
      e.preventDefault();
      if (isDragging && e.touches.length === 1) {
        posX = e.touches[0].clientX - startX;
        posY = e.touches[0].clientY - startY;
      } else if (e.touches.length === 2 && startDistance > 0) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        scale = Math.max(0.02, Math.min(5, scale * (dist / startDistance)));
        startDistance = dist;
      }
      updateMap();
    }, { passive: false });

    viewer.addEventListener('touchend', () => { isDragging = false; startDistance = 0; });

    // ── LOADING ──
    const progressBar  = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const loader       = document.getElementById('loader');
    const mainContent  = document.getElementById('mainContent');
    const mapImage     = document.getElementById('mapImage');

    const FALLBACK = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAwIiBoZWlnaHQ9IjYwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWUyOTNiIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIyNCIgZmlsbD0iI2ZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkNhcGFsb25nYSBNYXA8L3RleHQ+PC9zdmc+';

    function setProgress(pct, text) {
      progressBar.style.width = pct + '%';
      progressText.textContent = text;
    }
    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function loadApp() {
      setProgress(10, 'Loading map...');
      await delay(500);
      setProgress(40, 'Preparing controls...');
      await delay(400);

      let done = false;
      function finish(src) {
        if (done) return;
        done = true;
        mapImage.src = src;
        mapImage.classList.add('loaded');
        continueLoading();
      }

      const img = new Image();
      img.onload  = () => finish(img.src);
      img.onerror = () => finish(FALLBACK);
      img.src = 'capalonga map1';
      setTimeout(() => finish(FALLBACK), 5000); // never get stuck
    }

    async function continueLoading() {
      setProgress(70, 'Activating hotlines...');
      await delay(400);
      setProgress(95, 'Almost ready...');
      await delay(300);
      setProgress(100, 'Capalonga Map Active! 🗺️');
      await delay(500);
      loader.classList.add('hidden');
      mainContent.classList.add('show');
    }

    // ── NAVIGATION ──
    function setActiveTab(el) {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    document.getElementById('map-tab').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('viewer').scrollIntoView({ behavior: 'smooth', block: 'center' });
      setActiveTab(this);
    });

    document.getElementById('schedule-tab').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('schedule-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
      setActiveTab(this);
    });

    document.getElementById('hotlines-tab').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('hotcalls').scrollIntoView({ behavior: 'smooth', block: 'start' });
      setActiveTab(this);
    });

    // ── MODAL CLOSE ──
    function closeModal() {
      document.getElementById('schedule-modal').classList.remove('active');
      document.body.style.overflow = 'auto';
    }
    document.getElementById('close-modal').addEventListener('click', closeModal);
    document.getElementById('schedule-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── SCROLL: update active tab ──
    window.addEventListener('scroll', function() {
      const hotRect = document.getElementById('hotcalls')?.getBoundingClientRect();
      const mapRect = document.getElementById('viewer')?.getBoundingClientRect();
      if (hotRect && hotRect.top <= 150 && hotRect.bottom >= 0) {
        setActiveTab(document.getElementById('hotlines-tab'));
      } else if (mapRect && mapRect.top <= window.innerHeight / 2 && mapRect.bottom >= 0) {
        setActiveTab(document.getElementById('map-tab'));
      }
    });

    // ── START ──
    updateMap();
    loadApp();
  </script>
</body>
</html>
