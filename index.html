<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  #loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0f172a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.4s ease;
}

.progress-container {
  width: 200px;
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

.progress-bar {
  width: 0%;
  height: 100%;
  background: white;
  transition: width 0.2s ease;
}

  #progress-text {
  font-size: 14px;
  opacity: 0.8;
}
  .container {
    width: 100%;
    max-width: 1200px;
    padding: 10px;
  }

  .viewer {
    touch-action: none;
    position: relative;
    width: 100%;
    height: 80vh;
    overflow: hidden;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
  }

  .viewer img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    transform-origin: center;
    max-width: none;
    user-select: none;
    cursor: grab;
  }

  .toolbar {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }

  .toolbar button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
  }

  @media (max-width: 600px) {
    .toolbar button { padding: 14px; font-size: 16px; }
  }
  .marquee {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    margin-bottom: 10px;
  }

  .marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollText 12s linear infinite;
    font-size: 14px;
    opacity: 0.8;
  }

  @keyframes scrollText {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }
</style>
</head>
<body>
  <div id="loader">
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
        </div>
          <p id="progress-text">0%</p>
        </div>
    <div class="marquee">
        <span><h2>📍 Please mindful of your surrounding when using the map</h2></span>
    </div>
    
<div class="container">

  <!-- Built-in map image -->
  <div class="viewer" id="viewer">
    <img id="map" />
    
    <div class="toolbar">
      <button onclick="zoom(1.2)">+</button>
      <button onclick="zoom(0.8)">-</button>
      <button onclick="rotate(-90)">⟲</button>
      <button onclick="rotate(90)">⟳</button>
      <button onclick="resetView()">Reset</button>
      <button onclick="toggleFullscreen()">⛶</button>
    </div>
  </div>
</div>

<script>

const loader = document.getElementById('loader');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');

if (contentLength) {
  const percent = Math.round((receivedLength / contentLength) * 100);
  progressBar.style.width = percent + "%";
  progressText.textContent = percent + "%";
} else {
  // fallback if no content-length
  progressBar.style.width = "90%";
  progressText.textContent = "Loading...";
}

async function loadImageWithProgress(url) {
  const response = await fetch(url);
  const reader = response.body.getReader();
  const contentLength = response.headers.get('Content-Length');

  let receivedLength = 0;
  let chunks = [];

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    chunks.push(value);
    receivedLength += value.length;

    if (contentLength) {
      const percent = Math.round((receivedLength / contentLength) * 100);
      progressBar.style.width = percent + "%";
      progressText.textContent = percent + "%";
    }
  }

  // Combine chunks into blob
  const blob = new Blob(chunks);
  const imageURL = URL.createObjectURL(blob);

  // Set image source AFTER loading
  map.src = imageURL;

  // Hide loader
  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.style.display = "none", 300);
  }, 300);
}



const map = document.getElementById('map');
const viewer = document.getElementById('viewer');

// Call it instead of relying on <img src="">
loadImageWithProgress("capalonga map.jpg");

let scale = .04;
let rotation = 0;
let pos = { x: 0, y: 0 };
let dragging = false;
let start = { x: 0, y: 0 };

function updateTransform() {
  map.style.transform = `translate(-50%, -50%) translate(${pos.x}px, ${pos.y}px) scale(${scale}) rotate(${rotation}deg)`;
}

function zoom(factor) {
  scale *= factor;
  scale = Math.min(Math.max(0.02, scale), 5);
  updateTransform();
}

function rotate(deg) {
  rotation += deg;
  updateTransform();
}

function resetView() {
  scale = .04;
  rotation = 0;
  pos = { x: 0, y: 0 };
  updateTransform();
}

function toggleFullscreen() {
  if (!document.fullscreenElement) viewer.requestFullscreen();
  else document.exitFullscreen();
}

// Dragging (desktop + touch)
viewer.addEventListener('mousedown', (e) => {
  dragging = true;
  start = { x: e.clientX - pos.x, y: e.clientY - pos.y };
});

window.addEventListener('mouseup', () => dragging = false);

window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  pos.x = e.clientX - start.x;
  pos.y = e.clientY - start.y;
  updateTransform();
});

// Touch
let lastDistance = null;

// Helper: get distance between 2 fingers
function getDistance(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

viewer.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    // Drag
    const t = e.touches[0];
    dragging = true;
    start = { x: t.clientX - pos.x, y: t.clientY - pos.y };
  } else if (e.touches.length === 2) {
    // Start pinch
    dragging = false;
    lastDistance = getDistance(e.touches);
  }
});

viewer.addEventListener('touchmove', (e) => {
  e.preventDefault();

  if (e.touches.length === 1 && dragging) {
    // Drag
    const t = e.touches[0];
    pos.x = t.clientX - start.x;
    pos.y = t.clientY - start.y;
  } 
  else if (e.touches.length === 2) {
    // Pinch zoom
    const newDistance = getDistance(e.touches);

    if (lastDistance) {
      const zoomFactor = newDistance / lastDistance;
      scale *= zoomFactor;

      // Limit zoom (optional but recommended)
      scale = Math.min(Math.max(0.02, scale), 5);
    }

    lastDistance = newDistance;
  }

  updateTransform();
}, { passive: false });

viewer.addEventListener('touchend', () => {
  dragging = false;
  lastDistance = null;
});

// Scroll zoom
viewer.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.1 : 0.9);
});

// Initialize
updateTransform();
</script>
</body>
</html>
