<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Capalonga Guide Map</title>
<style>
  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent;
  }
      /* Modal/Popup Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal.active {
      display: block;
      opacity: 1;
    }

    /* SCROLLABLE MODAL */
    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      max-width: 95vw;
      max-height: 95vh;
      width: 95vw;
      height: 85vh;
      max-height: 650px;
      /* ✅ Taller for scroll */
      background: rgb(255, 255, 255);
      border-radius: 24px;
      overflow-y: auto;
      /* ✅ VERTICAL SCROLL */
      -webkit-overflow-scrolling: touch;
      /* ✅ iOS smooth */
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
    }

    .modal.active .modal-content {
      transform: translate(-50%, -50%) scale(1);
    }

    /* Image stays responsive */
    .schedule-image {
      width: 100%;
      height: 50vh;
      /* Fixed height */
      max-height: 350px;
      object-fit: cover;
      object-position: center;
      display: block;
      flex-shrink: 0;
      /* ✅ Don't shrink image */
    }

    /* Scrollable content area */
    .modal-body {
      flex: 1;
      /* ✅ Takes remaining space */
      padding: 0 24px 24px;
      overflow-y: auto;
    }

    /* Small phones */
    @media (max-height: 700px) {
      .modal-content {
        width: 98vw;
        height: 92vh;
      }

      .schedule-image {
        height: 40vh;
      }
    }

    .modal-header {
      padding: 24px 24px 0;
    }

    .modal-title {
      position: sticky;
      font-size: 24px;
      font-weight: 700;
      color: #1C1C1E;
      margin-bottom: 8px;
    }

    .modal-description {
      color: #6E6E73;
      font-size: 16px;
      margin-bottom: 24px;
    }

    .modal-close {
      position: fixed;
      /* ✅ FIXED - always on top */
      top: 20px;
      right: 20px;
      z-index: 2001;
      /* ✅ Above modal content */
      background: rgba(0, 0, 0, 0.7);
      border: none;
      font-size: 28px;
      color: white;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 50%;
      transition: all 0.2s ease;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: rgba(0, 0, 0, 0.9);
      transform: scale(1.1);
    }

    .modal-close:active {
      transform: scale(0.95);
    }

    /* Navigation Styles - FIXED & ENHANCED */
    .nav-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      /* Safari support */
      box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.12);
      z-index: 1000;
      padding: 16px 12px;
      /* Increased padding */
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .nav-tabs {
      display: flex;
      justify-content: space-around;
      max-width: 420px;
      /* Slightly smaller for better fit */
      margin: 0 auto;
      list-style: none;
      padding: 0 8px;
      /* Small side padding */
      gap: 8px;
      /* Space between tabs */
    }

    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 12px 8px;
      /* Reduced horizontal padding */
      min-height: 60px;
      /* Consistent height */
      color: #757577;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      /* Bouncy animation */
      border-radius: 20px;
      /* Larger radius */
      cursor: pointer;
      position: relative;
      max-width: none;
      /* Remove max-width constraint */
      touch-action: manipulation;
      /* Better mobile touch */
    }

    .nav-tab:hover {
      color: #007AFF;
      background: rgba(0, 122, 255, 0.12);
      transform: translateY(-3px);
    }

    .nav-tab:active {
      transform: translateY(-1px) scale(0.98);
      /* Press effect */
    }

    .nav-icon {
      font-size: 26px;
      /* Slightly larger */
      margin-bottom: 4px;
      line-height: 1;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
    }

    .nav-tab:hover .nav-icon {
      transform: scale(1.15);
    }

    .nav-tab.active .nav-icon {
      transform: scale(1.2);
    }

    .nav-label {
      font-size: 11px;
      /* Slightly larger */
      font-weight: 600;
      letter-spacing: 0.02em;
      text-align: center;
      line-height: 1.2;
      opacity: 0.9;
      transition: opacity 0.2s ease;
    }

    .nav-tab:hover .nav-label {
      opacity: 1;
    }



    .nav-tab.active .nav-label {
      opacity: 1;
    }



    /* Responsive improvements */
    @media (max-width: 480px) {
      .nav-tabs {
        max-width: 380px;
        gap: 6px;
      }

      .nav-tab {
        padding: 10px 6px;
        min-height: 56px;
      }

      .nav-icon {
        font-size: 24px;
      }

      .nav-label {
        font-size: 10px;
      }
    }

    @media (min-width: 768px) {
      .nav-container {
        position: relative;
        bottom: auto;
        max-width: 420px;
        margin: 40px auto 0;
        border-radius: 28px;
        padding: 20px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      }

      .nav-tabs {
        gap: 12px;
      }
    }

    /* Prevent text clipping */
    .nav-tab a {
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    /* Haptic feedback for mobile */
    @media (hover: none) and (pointer: coarse) {
      .nav-tab:active {
        background: rgba(0, 122, 255, 0.25);
      }
    }

    .page-content {
      padding-bottom: 110px;
      padding-top: 20px;
    }

    @media (min-width: 768px) {
      .nav-container {
        position: relative;
        bottom: auto;
        max-width: 400px;
        margin: 40px auto 0;
        border-radius: 24px;
      }

      .page-content {
        padding-bottom: 20px;
      }
    }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #fff;
    min-height: 100vh;
    padding: 16px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #marquee {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(15, 23, 42, 0.98);
    backdrop-filter: blur(20px);
    z-index: 1001;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    margin: 0 -16px;
    font-size: 14px;
    font-weight: 600;
    color: #e2e8f0;
  }

  /* FIXED LOADING - SIMPLE & RELIABLE */
  #loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: #0f172a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1002;
  }

  .loader-icon {
    font-size: 48px;
    margin-bottom: 30px;
    animation: bounce 1.5s infinite;
  }

  @keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
    60% { transform: translateY(-5px); }
  }

  .progress-container {
    width: 280px;
    max-width: 90vw;
    height: 12px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 25px;
  }

  .progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #10b981);
    border-radius: 12px;
    transition: width 0.3s ease;
  }

  #progress-text {
    font-size: 16px;
    font-weight: 600;
    color: #f1f5f9;
  }

  /* HIDE LOADER */
  #loader.hidden {
    display: none !important;
  }

  /* MAIN CONTENT */
  .container {
    margin-top: 20px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .container.show {
    opacity: 1;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #3b82f6, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    margin-bottom: 10px;
  }

  .viewer {
    position: relative;
    width: 100%;
    height: 65vh;
    min-height: 420px;
    border-radius: 24px;
    overflow: hidden;
    background: rgba(255,255,255,0.02);
    box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    backdrop-filter: blur(15px);
    margin-bottom: 30px;
    border: 1px solid rgba(255,255,255,0.1);
    touch-action: none;
  }

  .viewer img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    max-width: none;
    user-select: none;
    -webkit-user-drag: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    width: auto;
    height: auto;
  }

  .viewer img.loaded {
    opacity: 1;
  }

  /* RESPONSIVE TOOLBAR - WORKS ON ALL MOBILE DEVICES */
  .toolbar {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    background: rgba(0,0,0,0.92);
    padding: 12px 16px;
    border-radius: 24px;
    backdrop-filter: blur(30px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    z-index: 10;
    max-width: calc(100vw - 32px);
    width: fit-content;
    min-width: 400px;
  }

  /* Small phones (under 360px) */
  @media (max-width: 360px) {
    .toolbar {
      bottom: 5px;
      padding: 5px 6px;
      gap: 6px;
      border-radius: 20px;
      min-width: 300px;
    }
  }

  /* Extra small phones */
  @media (max-width: 320px) {
    .toolbar {
      bottom: 10px;
      padding: 8px 10px;
      gap: 5px;
      border-radius: 18px;
      min-width: 240px;
    }
  }

  .toolbar button {
    flex: 0 0 auto;
    width: clamp(10px, 5vw, 52px);
    height: clamp(44px, 5vw, 52px);
    min-width: 44px;
    min-height: 44px;
    max-width: 56px;
    max-height: 56px;
    border-radius: 14px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: clamp(20px, 2.5vw, 20px);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }

  /* Smaller buttons on very small screens */
  @media (max-width: 360px) {
    .toolbar button {
      width: clamp(30px, 6.5vw, 600px);
      height: clamp(30px, 5.5vw, 48px);
      min-width: 30px;
      min-height: 30px;
      border-radius: 12px;
      font-size: clamp(15px, 2.2vw, 18px);
    }
  }

  .toolbar button:active {
    transform: scale(0.95);
    background: rgba(255,255,255,0.3);
  }

  .info-section h2 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #3b82f6, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    margin-bottom: 30px;
  }

  .hotline {
    background: rgba(255,255,255,0.08);
    padding: 30px 24px;
    border-radius: 24px;
    margin: 20px 0;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    transition: transform 0.2s ease;
  }

  .hotline:active {
    transform: scale(0.99);
  }

  .hotline b {
    color: #10b981;
    font-size: 24px;
    display: block;
    margin-bottom: 16px;
    font-weight: 800;
  }

  .hotline a {
    display: block;
    color: #f59e0b;
    text-decoration: none;
    font-size: 24px;
    font-weight: 700;
    padding: 18px 24px;
    margin: 10px 0;
    border-radius: 18px;
    background: rgba(245,158,11,0.15);
    border: 2px solid rgba(245,158,11,0.3);
    transition: all 0.2s ease;
    text-align: center;
  }

  .hotline a::before {
    content: '📞 ';
  }

  .hotline a:active {
    background: rgba(245,158,11,0.3);
    transform: scale(0.98);
  }
</style>
</head>
<body>

<script>
 // Modal functionality for Schedule popup
    const scheduleModal = document.getElementById('schedule-modal');
    const scheduleTab = document.getElementById('schedule-tab');
    const closeModalBtn = document.getElementById('close-modal');

    scheduleTab?.addEventListener('click', function (e) {
      e.preventDefault();
      scheduleModal.classList.add('active');
      document.body.style.overflow = 'hidden'; // Prevent background scroll
    });

    closeModalBtn?.addEventListener('click', function () {
      scheduleModal.classList.remove('active');
      document.body.style.overflow = 'auto';
    });

    // Close modal when clicking outside
    scheduleModal?.addEventListener('click', function (e) {
      if (e.target === this) {
        scheduleModal.classList.remove('active');
        document.body.style.overflow = 'auto';
      }
    });

    // Close modal with Escape key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && scheduleModal.classList.contains('active')) {
        scheduleModal.classList.remove('active');
        document.body.style.overflow = 'auto';
      }
    });

    // Highlight active tab based on current URL
    document.addEventListener('DOMContentLoaded', function () {
      const currentPath = window.location.pathname.split('/').pop() || 'index.html';
      const navLinks = document.querySelectorAll('.nav-link');

      navLinks.forEach(link => {
        const linkPath = link.getAttribute('href');
        const parentTab = link.closest('.nav-tab');

        if (linkPath === currentPath) {
          parentTab.classList.add('active');
        } else {
          parentTab.classList.remove('active');
        }
      });
    });

    // Hotlines smooth scroll
    document.getElementById('hotlines-tab')?.addEventListener('click', function (e) {
      e.preventDefault();
      const hotlinesSection = document.getElementById('hotcalls');
      if (hotlinesSection) {
        hotlinesSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        hotlinesSection.classList.add('visible');
        document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
        this.closest('.nav-tab').classList.add('active');
      }
    });

    // Page link transitions (only for Map)
    document.querySelectorAll('.nav-link[href$=".html"]').forEach(link => {
      link.addEventListener('click', function () {
        document.body.style.opacity = '0.7';
        setTimeout(() => document.body.style.opacity = '1', 200);
      });
    });
    // Smooth scroll for Hotlines tab
    document.getElementById('hotlines-tab')?.addEventListener('click', function (e) {
      e.preventDefault();
      const hotlinesSection = document.getElementById('hotcalls');

      if (hotlinesSection) {
        hotlinesSection.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });

        // Show animation
        hotlinesSection.classList.add('visible');

        // Activate hotlines tab
        document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
        this.closest('.nav-tab').classList.add('active');
      }
    });

    // Smooth transitions for page links
    document.querySelectorAll('.nav-link:not(.scroll-link)').forEach(link => {
      link.addEventListener('click', function () {
        document.body.style.opacity = '0.7';
        setTimeout(() => {
          document.body.style.opacity = '1';
        }, 200);
      });
    });

    // Update active tab on scroll (optional - for hotlines)
    window.addEventListener('scroll', function () {
      const hotlinesSection = document.getElementById('hotcalls');
      const hotlinesTab = document.getElementById('hotlines-tab');

      if (hotlinesSection && hotlinesTab) {
        const rect = hotlinesSection.getBoundingClientRect();
        if (rect.top <= 100 && rect.bottom >= 100) {
          document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
          hotlinesTab.classList.add('active');
        }
      }
    });

    // Smooth page transitions (optional)
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', function (e) {
        // Add loading state or animation if desired
        document.body.style.opacity = '0.7';
        setTimeout(() => {
          document.body.style.opacity = '1';
        }, 200);
      });
    });

    // MAP SCROLL - NEW
    document.querySelector('.nav-tab a[href="index.html"]').addEventListener('click', function (e) {
      e.preventDefault(); // Prevent page reload
      const mapSection = document.getElementById('viewer');
      if (mapSection) {
        mapSection.scrollIntoView({
          behavior: 'smooth',
          block: 'center'  // Centers map perfectly
        });
        // Activate map tab
        document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
        this.closest('.nav-tab').classList.add('active');
      }
    });

    // SCHEDULE POPUP - Keep existing
    document.getElementById('schedule-tab')?.addEventListener('click', function (e) {
      e.preventDefault();
      document.getElementById('schedule-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    });

    // HOTLINES SCROLL - Simplified
    document.getElementById('hotlines-tab')?.addEventListener('click', function (e) {
      e.preventDefault();
      const hotlinesSection = document.getElementById('hotcalls');
      if (hotlinesSection) {
        hotlinesSection.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
        document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
        this.closest('.nav-tab').classList.add('active');
      }
    });

    // MODAL CLOSE
    document.getElementById('close-modal')?.addEventListener('click', function () {
      document.getElementById('schedule-modal').classList.remove('active');
      document.body.style.overflow = 'auto';
    });

    // Close modal outside click
    document.getElementById('schedule-modal')?.addEventListener('click', function (e) {
      if (e.target === this) {
        this.classList.remove('active');
        document.body.style.overflow = 'auto';
      }
    });

    // ESCAPE KEY
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        document.getElementById('schedule-modal')?.classList.remove('active');
        document.body.style.overflow = 'auto';
      }
    });

    // SCROLL DETECTION - Active tab updates
    window.addEventListener('scroll', function () {
      const mapRect = document.getElementById('viewer')?.getBoundingClientRect();
      const hotlinesRect = document.getElementById('hotcalls')?.getBoundingClientRect();

      if (mapRect?.top <= window.innerHeight / 2) {
        document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
        document.querySelector('.nav-tab a[href="index.html"]').closest('.nav-tab')?.classList.add('active');
      } else if (hotlinesRect?.top <= 100) {
        document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
        document.getElementById('hotlines-tab')?.classList.add('active');
      }
    });
let scale = 0.04;
let rotation = 0;
let posX = 0, posY = 0;
let isDragging = false;
let startX = 0, startY = 0;
let startDistance = 0;

// MAP CONTROLS
function updateMap() {
  const img = document.getElementById('mapImage');
  img.style.transform = `translate(-50%, -50%) translate(${posX}px, ${posY}px) scale(${scale}) rotate(${rotation}deg)`;
}

function zoomIn() { scale = Math.min(5, scale * 1.25); updateMap(); }
function zoomOut() { scale = Math.max(0.02, scale * 0.8); updateMap(); }
function rotateLeft() { rotation = (rotation - 90 + 360) % 360; updateMap(); }
function rotateRight() { rotation = (rotation + 90 + 360) % 360; updateMap(); }
function resetMap() { scale = 0.04; rotation = 0; posX = 0; posY = 0; updateMap(); }
function toggleFull() {
  const viewer = document.getElementById('viewer');
  if (!document.fullscreenElement) {
    viewer.requestFullscreen?.() || viewer.webkitRequestFullscreen?.();
  } else {
    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
  }
}

// TOUCH CONTROLS
const viewer = document.getElementById('viewer');
viewer.addEventListener('touchstart', (e) => {
  if (e.target.closest('.toolbar')) return;
  if (e.touches.length === 1) {
    isDragging = true;
    startX = e.touches[0].clientX - posX;
    startY = e.touches[0].clientY - posY;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    startDistance = Math.sqrt(dx*dx + dy*dy);
  }
}, {passive: true});

viewer.addEventListener('touchmove', (e) => {
  if (e.target.closest('.toolbar')) return;
  e.preventDefault();
  
  if (isDragging && e.touches.length === 1) {
    posX = e.touches[0].clientX - startX;
    posY = e.touches[0].clientY - startY;
  } else if (e.touches.length === 2 && startDistance > 0) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const distance = Math.sqrt(dx*dx + dy*dy);
    const factor = distance / startDistance;
    scale *= factor;
    scale = Math.max(0.02, Math.min(5, scale));
    startDistance = distance;
  }
  updateMap();
}, {passive: false});

viewer.addEventListener('touchend', () => {
  isDragging = false;
  startDistance = 0;
});
